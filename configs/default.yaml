# volscalp default configuration
# Numeric thresholds may be overridden from the dashboard UI at runtime.

mode: paper                    # initial default; both paper + live always run
indices: [NIFTY, BANKNIFTY]
expiry: monthly                # monthly only (per FRD)

session:
  timezone: Asia/Kolkata
  start: "09:30"
  end:   "15:15"
  warmup_from: "09:15"         # engine initialises & builds ATM before start

engine:
  cooldown_minutes: 0
  momentum_threshold_pct: 1.0
  strike_offset_ce: 6
  strike_offset_pe: -6
  base_leg_sl_pct: 15.0
  lazy_leg_sl_pct: 12.0
  lazy_enabled: true
  entry_price_source: close    # close | next_open
  sl_price_source: low         # close | low (intrabar) — default 'low' matches
                               # Codex's simulate_strategy_day SL trigger and
                               # the 2y backtest's intrabar SL check, so
                               # backtest, paper, and live all fire stops on
                               # the same bar.
  lots_per_trade_paper: 1      # per-mode lot size
  lots_per_trade_live:  1
  max_concurrent_cycles: 2     # 1 per index max

# Aggregate-MTM exit: (realised + unrealised) summed across all legs of
# the current cycle is evaluated every bar, priority
#   max_loss → target.
# Lock-and-trail was evaluated and removed (2026-04) — it did not improve
# P&L in backtests and added complexity. Dashboard UI can override any of
# these per-index at runtime.
mtm_profiles:
  NIFTY:
    max_loss: 2500
    target:    300
  BANKNIFTY:
    max_loss: 2500
    target:    300

instruments:
  # Dhan uses SecurityId + ExchangeSegment. These are populated from the
  # instrument master at startup — only configure overrides here.
  # Lot sizes mirror the current NSE contract specification. Update here AND
  # in the backtest scripts (scripts/backtest_2y.py, scripts/backtest.py) if
  # the exchange revises contract sizes.
  NIFTY:
    underlying_symbol: "NIFTY"
    strike_interval: 50
    lot_size: 65            # NSE NIFTY options (current contract size)
  BANKNIFTY:
    underlying_symbol: "BANKNIFTY"
    strike_interval: 100
    lot_size: 30           # NSE BANKNIFTY options (current contract size)

broker:
  name: dhan
  feed_mode: quote         # quote | ticker | depth_20
  ws_reconnect_backoff_s: [1, 2, 4, 8, 16, 30]
  reconcile_interval_s: 1  # Dhan positions poll cadence (live mode)
  order_timeout_s: 5

paper:
  fill_source: ltp         # ltp | best_bid_ask
  slippage_bps: 0

dashboard:
  host: 127.0.0.1
  port: 8765
  kill_switch_require_confirm: true
  live_mode_require_confirm: true

persistence:
  sqlite_path: data/volscalp.db
  bar_snapshots_enabled: true

logging:
  level: INFO
  json_output: true
  path: logs/volscalp.log
